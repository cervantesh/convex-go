name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

jobs:
  smoke:
    name: Smoke ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: stable
          check-latest: true
          cache: true

      - name: Format
        run: go run ./cmd/convex-go-maint fmt-check

      - name: Module verify
        run: go mod verify

      - name: Git diff check
        run: git diff --check

      - name: Test
        run: go test ./... -count=1

      - name: Demo module tidy
        working-directory: examples/realtime_chat
        run: go mod tidy -diff

      - name: Demo smoke
        working-directory: examples/realtime_chat
        run: go test ./... -count=1

  quality:
    name: Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.25"
          - stable
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
          cache: true

      - name: Format
        run: go run ./cmd/convex-go-maint fmt-check

      - name: Module verify
        run: go mod verify

      - name: Module tidy
        run: go mod tidy -diff

      - name: Git diff check
        run: git diff --check

      - name: Test
        run: go test ./... -count=1

      - name: Race
        run: go test ./... -race -count=1

      - name: Shuffle test
        run: go test ./... -shuffle=on -count=1

      - name: Vet
        run: go vet ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vulnerability check
        run: govulncheck ./...

      - name: Coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Coverage threshold
        run: go run ./cmd/convex-go-maint coverage-check -coverprofile=coverage.out -min=90

      - name: Test report
        run: go test -json ./... > test-report.out

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: Lint
        run: golangci-lint run --timeout=5m --output.json.path=golangci-report.json

      - name: Upload quality reports
        uses: actions/upload-artifact@v7.0.1
        with:
          name: quality-reports-go-${{ matrix.go-version }}
          path: |
            coverage.out
            test-report.out
            golangci-report.json
          if-no-files-found: error

      - name: SonarQube Scan
        if: ${{ matrix.go-version == 'stable' && github.event_name != 'pull_request' && env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate check
        if: ${{ matrix.go-version == 'stable' && github.event_name != 'pull_request' && env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 5
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
